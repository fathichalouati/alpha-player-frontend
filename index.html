<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alphabet216 - Premium App</title>
    
    <!-- إعداد Tailwind بألوان Asbet المخصصة -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        asbet: {
                            dark: '#0B001A',      /* الخلفية الأساسية (أسود بنفسجي) */
                            card: '#180A2B',      /* خلفية البطاقات والأزرار */
                            primary: '#E8006F',   /* الوردي الفاقع (أزرار التسجيل) */
                            secondary: '#91167B', /* البنفسجي الداكن (للتدرجات) */
                            accent: '#FACC15'     /* الأصفر للتنبيهات والكوينز */
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0B001A;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* تأثيرات النيون والأزرار */
        .btn-gradient {
            background: linear-gradient(90deg, #E8006F 0%, #91167B 100%);
            box-shadow: 0 4px 15px rgba(232, 0, 111, 0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #E8006F;
            color: #E8006F;
        }

        /* أيقونات القائمة العلوية الدائرية */
        .category-box {
            min-width: 70px;
            height: 70px;
            background-color: #180A2B;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .category-box:active { transform: scale(0.95); border-color: #E8006F; }

        /* شريط سفلي عائم واحترافي */
        .bottom-nav {
            background: rgba(24, 10, 43, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .nav-item.active {
            color: #E8006F;
        }
        
        /* زر القائمة المركزي البارز */
        .center-menu-btn {
            background: #180A2B;
            border: 2px solid #E8006F;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-15px);
            box-shadow: 0 5px 15px rgba(232, 0, 111, 0.3);
        }
    </style>
</head>

<body class="pb-24">

    <!-- الهيدر العلوي (Sticky Header) -->
    <header class="sticky top-0 z-50 bg-asbet-dark/95 backdrop-blur-md px-4 py-3 flex justify-between items-center shadow-md border-b border-white/5">
        <div class="flex items-center gap-2">
            <!-- شعار مؤقت بستايل Asbet -->
            <div class="text-2xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-asbet-primary to-white tracking-tighter">
                Alphabet
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button class="btn-outline px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider">
                SE CONNECTER
            </button>
            <button class="btn-gradient px-4 py-1.5 rounded-full text-[10px] font-bold text-white uppercase tracking-wider">
                S'INSCRIRE
            </button>
        </div>
    </header>

    <!-- شريط الفئات الأفقي (Horizontal Categories) -->
    <div class="flex overflow-x-auto gap-3 py-4 px-4 no-scrollbar">
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="category-box text-asbet-primary">🎡</div>
            <span class="text-[9px] font-bold text-gray-400 text-center leading-tight">ROUE DE<br>FORTUNE</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="category-box">🏆</div>
            <span class="text-[9px] font-bold text-gray-400 text-center leading-tight">COUPE DU<br>MONDE 2026</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="category-box text-asbet-accent">🎁</div>
            <span class="text-[9px] font-bold text-gray-400 text-center leading-tight">PROMOTIONS</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="category-box">⚽</div>
            <span class="text-[9px] font-bold text-gray-400 text-center leading-tight">SPORTS</span>
        </div>
        <div class="flex flex-col items-center gap-2 cursor-pointer">
            <div class="category-box text-rose-500">🎰</div>
            <span class="text-[9px] font-bold text-gray-400 text-center leading-tight">LIVE<br>CASINO</span>
        </div>
    </div>

    <!-- السلايدر المتحرك (Swiper Banners) -->
    <div class="px-4 mb-6">
        <div class="swiper heroSwiper w-full h-[180px] rounded-2xl overflow-hidden shadow-2xl border border-white/5">
            <div class="swiper-wrapper">
                <div class="swiper-slide bg-gradient-to-r from-asbet-secondary to-asbet-dark flex items-center p-6 relative">
                    <div class="absolute right-0 top-0 opacity-50 text-8xl">🎰</div>
                    <div class="relative z-10">
                        <span class="bg-asbet-primary text-[8px] font-bold px-2 py-1 rounded uppercase">Nouveau</span>
                        <h2 class="text-2xl font-black mt-2 leading-tight">TOURNOI<br>CASINO</h2>
                        <p class="text-[10px] text-gray-300 mt-1">Gagnez jusqu'à 10,000 TND</p>
                    </div>
                </div>
                <div class="swiper-slide bg-gradient-to-r from-blue-900 to-asbet-dark flex items-center p-6 relative">
                    <div class="absolute right-0 top-0 opacity-50 text-8xl">⚽</div>
                    <div class="relative z-10">
                        <span class="bg-blue-500 text-[8px] font-bold px-2 py-1 rounded uppercase">Sport</span>
                        <h2 class="text-2xl font-black mt-2 leading-tight">FREEBET<br>PREMIER DÉPÔT</h2>
                    </div>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <!-- قسم الألعاب الأول (Top des vainqueurs) -->
    <div class="px-4 mb-6">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-bold flex items-center gap-2">Top des vainqueurs <span class="bg-white text-asbet-dark text-[8px] px-2 py-0.5 rounded-full font-black uppercase">En direct</span></h3>
        </div>
        
        <!-- بطاقات صغيرة للمرابيح -->
        <div class="flex overflow-x-auto gap-3 no-scrollbar pb-2">
            <div class="bg-asbet-card rounded-xl p-2 flex items-center gap-3 min-w-[200px] border border-white/5">
                <img src="https://placehold.co/40x40/E8006F/FFF?text=G" class="rounded-lg w-10 h-10 object-cover">
                <div>
                    <div class="text-[10px] text-gray-400">124***1870</div>
                    <div class="text-xs font-bold text-asbet-accent">228.54 TND</div>
                </div>
            </div>
            <div class="bg-asbet-card rounded-xl p-2 flex items-center gap-3 min-w-[200px] border border-white/5">
                <img src="https://placehold.co/40x40/91167B/FFF?text=M" class="rounded-lg w-10 h-10 object-cover">
                <div>
                    <div class="text-[10px] text-gray-400">985***930</div>
                    <div class="text-xs font-bold text-asbet-accent">19.20 TND</div>
                </div>
            </div>
        </div>
    </div>

    <!-- قسم ألعاب الكازينو (Jeux de casino) -->
    <div class="px-4 mb-6">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-bold">Jeux de casino</h3>
            <button class="text-[10px] text-gray-400 hover:text-white">Tous ➔</button>
        </div>
        
        <div class="grid grid-cols-3 gap-3">
            <!-- Game Card 1 -->
            <div class="bg-asbet-card rounded-xl overflow-hidden relative border border-white/5">
                <span class="absolute top-1 left-1 bg-asbet-primary text-[8px] font-bold px-1.5 py-0.5 rounded z-10">HOT</span>
                <img src="https://placehold.co/300x400/2A134B/FFF?text=Lady+Monopoly" class="w-full h-28 object-cover">
            </div>
            <!-- Game Card 2 -->
            <div class="bg-asbet-card rounded-xl overflow-hidden relative border border-white/5">
                <img src="https://placehold.co/300x400/180A2B/FFF?text=Atlantis" class="w-full h-28 object-cover">
            </div>
            <!-- Game Card 3 -->
            <div class="bg-asbet-card rounded-xl overflow-hidden relative border border-white/5">
                <span class="absolute top-1 left-1 bg-asbet-accent text-asbet-dark text-[8px] font-bold px-1.5 py-0.5 rounded z-10">NEW</span>
                <img src="https://placehold.co/300x400/91167B/FFF?text=Sweet" class="w-full h-28 object-cover">
            </div>
        </div>
    </div>

    <!-- شريط التنقل السفلي الاحترافي (Bottom Nav) -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-[65px] flex justify-around items-center px-2 z-[100]">
        
        <button class="nav-item flex flex-col items-center justify-center w-[20%] text-gray-500 transition-colors">
            <span class="text-xl mb-1">⏱️</span>
            <span class="text-[9px] font-bold uppercase">Sports</span>
        </button>

        <button class="nav-item flex flex-col items-center justify-center w-[20%] text-gray-500 transition-colors">
            <span class="text-xl mb-1">📺</span>
            <span class="text-[9px] font-bold uppercase">En direct</span>
        </button>

        <!-- زر القائمة المركزي البارز (المنيو أو الكوبون) -->
        <button class="flex flex-col items-center justify-center w-[20%] relative">
            <div class="center-menu-btn text-white text-xl">
                <span>☰</span>
            </div>
        </button>

        <button class="nav-item flex flex-col items-center justify-center w-[20%] text-gray-500 transition-colors">
            <span class="text-xl mb-1">📄</span>
            <span class="text-[9px] font-bold uppercase">Fiche</span>
        </button>

        <button class="nav-item active flex flex-col items-center justify-center w-[20%] transition-colors">
            <span class="text-xl mb-1">🎰</span>
            <span class="text-[9px] font-bold uppercase">Casino</span>
        </button>
    </nav>

    <!-- Swiper JS Script -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const heroSwiper = new Swiper('.heroSwiper', {
                loop: true,
                autoplay: { delay: 3500, disableOnInteraction: false },
                pagination: { el: '.swiper-pagination', clickable: true },
            });
        });
        
        // إبقاء جميع دوالك القديمة (الاتصال بالسيرفر) أسفل هذا التعليق لكي تعمل الألعاب
        
    </script>
</body>
</html>
